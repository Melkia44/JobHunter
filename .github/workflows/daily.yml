name: Daily Job Hunt

on:
  schedule:
    - cron: '30 8 * * *'  # 09:30 Paris (hiver) / 10:30 (été) — horaire flottant assumé
  workflow_dispatch:

concurrency:
  group: daily-run
  cancel-in-progress: false

permissions:
  contents: write  # commit de data/seen_jobs.db

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv (Python 3.13)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'  # aligné sur .python-version (acté 04/07/2026)

      - name: Install deps
        run: uv sync --frozen

      - name: Write service account JSON
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$SA_JSON" > secrets/service_account.json

      # Jamais de LinkedIn ici : IP cloud = ban (local uniquement via run_locally.sh)
      - name: Run job hunter
        shell: bash  # active pipefail : un échec du run n'est pas masqué par tee
        env:
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run job-hunter run 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated dedup DB
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/seen_jobs.db; then
            echo "DB dédup inchangée — rien à pousser."
            exit 0
          fi
          # Push résilient : des runs qui se suivent modifient tous data/seen_jobs.db
          # (binaire) → un rebase butterait sur un conflit binaire inauto-mergeable. On
          # resynchronise sur origin/main en GARDANT notre version de la DB (l'union
          # n'est pas critique : la dédup Sheet par URL reste le garde-fou). Retry x3
          # pour absorber une course avec un run concurrent.
          for i in 1 2 3; do
            git add data/seen_jobs.db
            git commit -m "chore(dedup): update seen_jobs.db [skip ci]" || true
            if git push origin HEAD:main; then
              echo "Push OK (tentative $i)."
              exit 0
            fi
            echo "Push rejeté (tentative $i) — resync sur origin/main, on conserve notre DB."
            git fetch origin main
            git reset --soft origin/main
          done
          echo "Push définitivement échoué après 3 tentatives." >&2
          exit 1
